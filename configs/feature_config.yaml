# Feature Engineering Configuration
# Controls the 200+ feature generation pipeline

# Rolling window statistical features
windows:
  short_term: [6, 12, 24]   # Hours — recent behavior
  medium_term: [48, 72]     # Hours — shift-level patterns
  long_term: [168]          # Hours (7 days) — weekly trends

# Feature groups and their parameters
feature_groups:
  statistical:
    enabled: true
    functions: [mean, std, min, max, skew, kurtosis, q25, q50, q75, range, iqr]

  rate_of_change:
    enabled: true
    periods: [1, 3, 6, 12, 24]  # Hours to compute delta

  trend:
    enabled: true
    window_sizes: [24, 72, 168]  # Hours for linear fit

  frequency:
    enabled: true
    fft_window: 64  # Must be power of 2
    sampling_rate_hz: 1/3600  # 1 sample per hour

  interaction:
    enabled: true
    pairs:
      - [voltage, rotation_speed]
      - [voltage, pressure]
      - [voltage, vibration]
      - [rotation_speed, pressure]
      - [rotation_speed, vibration]
      - [pressure, vibration]
    correlation_windows: [24]

  degradation:
    enabled: true
    ewma_alphas: [0.1, 0.05]

  temporal:
    enabled: true
    cyclical_encoding: true

  history:
    enabled: true
    error_windows: [24, 72, 168]
    maintenance_windows: [7, 30]

# Label engineering
labeling:
  prediction_horizon_hours: 24
  failure_types:
    - comp1
    - comp2
    - comp3
    - comp4
  multi_label: true

# Output
output_format: parquet
compression: snappy
