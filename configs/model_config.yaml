# ============================================================
# Predictive Maintenance — Master Configuration
# ============================================================
# Generated by: src/utils/config.py
# Edit this file directly or regenerate via Config.save()

data:
  raw_dir: data/raw
  processed_dir: data/processed
  models_dir: models
  telemetry_file: PdM_telemetry.csv
  errors_file: PdM_errors.csv
  maint_file: PdM_maint.csv
  failures_file: PdM_failures.csv
  machines_file: PdM_machines.csv
  sensor_cols:
    - volt
    - rotate
    - pressure
    - vibration
  id_col: machineID
  timestamp_col: datetime
  column_mapping:
    machineID: machine_id
    volt: voltage
    rotate: rotation_speed
    pressure: pressure
    vibration: vibration
    datetime: timestamp
    errorID: error_id
    comp: component
    model: machine_model
    age: machine_age_years
    failure: failure_type

features:
  window_sizes:
    - 6
    - 12
    - 24
    - 48
    - 72
    - 168
  lag_periods:
    - 1
    - 3
    - 6
    - 12
    - 24
    - 48
    - 72
    - 168
  prediction_horizon_hours: 24
  failure_lead_time_hours: 48
  min_cycles_before_failure: 24
  statistical_features:
    - mean
    - std
    - min
    - max
    - skew
    - kurtosis
    - q25
    - q50
    - q75
    - range
    - iqr
  trend_features:
    - slope
    - intercept
    - r_squared
  frequency_features:
    - dominant_freq
    - spectral_energy
    - spectral_entropy

model:
  xgboost_params:
    n_estimators: 500
    max_depth: 8
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
    scale_pos_weight: 12
    objective: 'binary:logistic'
    eval_metric: aucpr
    early_stopping_rounds: 50
    random_state: 42
  random_forest_params:
    n_estimators: 300
    max_depth: 12
    min_samples_split: 20
    min_samples_leaf: 10
    class_weight: balanced
    random_state: 42
    n_jobs: -1
  lstm_params:
    sequence_length: 48
    hidden_size: 128
    num_layers: 2
    dropout: 0.3
    bidirectional: true
    attention_heads: 4
    batch_size: 256
    learning_rate: 0.001
    weight_decay: 1.0e-05
    epochs: 100
    patience: 15
  test_size: 0.2
  validation_size: 0.1
  cv_folds: 5
  random_seed: 42
  use_smote: false
  use_class_weights: true
  pos_weight_factor: 12.0

evaluation:
  cost_true_positive: 500.0
  cost_false_positive: 500.0
  cost_false_negative: 12000.0
  cost_true_negative: 0.0
  downtime_cost_per_hour: 8000.0
  annual_maintenance_budget: 2400000.0
  target_precision: 0.85
  target_recall: 0.85
  target_false_alarm_rate: 0.05

dashboard:
  title: 'Predictive Maintenance — Fleet Health Monitor'
  port: 8501
  refresh_interval_seconds: 30
  risk_low_threshold: 0.2
  risk_medium_threshold: 0.5
  risk_high_threshold: 0.7
  kpi_targets:
    availability: 0.95
    mtbf_hours: 1500
    oee: 0.85
    schedule_compliance: 0.9
    false_alarm_rate: 0.05
